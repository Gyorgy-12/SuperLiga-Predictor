<!doctype html><html lang="hu"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>FIFA World Cup 2026</title><style>
:root{
  --bg:#05090b;
  --surface:#0f161a;
  --surface2:#151d23;
  --surface3:#1c2530;
  --hdr1:#4b0008;
  --hdr2:#2e0005;
  --text:#e8edf0;
  --muted:#7e8c96;
  --muted2:#a4b0b8;
  --green:#28d16c;
  --blue:#6ec6ff;
  --cyan:#17ceca;
  --aqua:#7ee8ea;
  --orange:#f59500;
  --red:#f04050;
  --el:#e8a020;
  --logo:clamp(19px,calc(14.0345px + 1.5517vw),28px);
  --row-h:clamp(40px,calc(33.3793px + 2.069vw),52px);
  --card-r:clamp(12px,calc(9.7931px + 0.6897vw),16px);
  --pp:clamp(10px,calc(5.5862px + 1.3793vw),18px);
  --cp:clamp(10px,calc(5.5862px + 1.3793vw),18px);
  --fz-xs:clamp(8px,calc(6.3448px + 0.5172vw),11px);
  --fz-sm:clamp(9px,calc(7.3448px + 0.5172vw),12px);
  --fz-md:clamp(11px,calc(9.3448px + 0.5172vw),14px);
  --fz-lg:clamp(13px,calc(10.7931px + 0.6897vw),17px);
  --fz-title:clamp(14px,calc(11.7931px + 0.6897vw),18px);
  --fz-ht:clamp(15px,calc(13.3448px + 0.5172vw),18px);
  --fz-sz:clamp(25px,calc(20.0345px + 1.5517vw),34px);
  --page-max:720px;
  --top-h:148px;
  --line:rgba(255,255,255,.08);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-weight:500;
  overflow-x:hidden;
}

.app{
  min-height:100vh;
}

.top{
  position:fixed;
  inset:0 0 auto;
  z-index:9999;
  background:linear-gradient(175deg,#6b000e 0%,#480007 40%,#2e0005 100%);
  border-bottom:1px solid #1a2228;
  will-change:contents;
}

.top.shrunken .hdr{
  height:clamp(60px,15vw,76px);
  padding-top:clamp(7px,1.8vw,10px);
}

.top.shrunken .li-box{
  width:clamp(30px,7.5vw,38px);
  height:clamp(30px,7.5vw,38px);
}

.top.shrunken .li-title{
  font-size:clamp(10px,2.5vw,12.5px);
}

.top.shrunken .li-season{
  font-size:clamp(17px,4.3vw,22px);
}

.top.shrunken .tabs{
  height:clamp(36px,8.8vw,44px);
}

.top.shrunken .tab{
  font-size:clamp(11.8px,2.92vw,14.2px);
  padding-bottom:clamp(6px,1.5vw,9px);
}

.hdr{
  height:clamp(88px,21vw,116px);
  padding:clamp(12px,3vw,18px) var(--pp) clamp(6px,1.5vw,10px);
  display:flex;
  align-items:flex-start;
  gap:clamp(9px,2.5vw,14px);
  transition:height .2s,padding-top .2s;
}

.hdr-back{
  width:clamp(24px,6vw,30px);
  height:clamp(24px,6vw,30px);
  display:grid;
  place-items:center;
  color:#fff;
  font-size:clamp(18px,4.5vw,24px);
  flex:0 0 auto;
  padding-top:2px;
}

.li-box{
  width:clamp(38px,9.2vw,50px);
  height:clamp(38px,9.2vw,50px);
  border-radius:clamp(7px,1.8vw,10px);
  background:#0e1f27;
  padding:clamp(4px,1.1vw,6px);
  flex:0 0 auto;
  overflow:hidden;
  display:grid;
  place-items:center;
  transition:width .2s,height .2s;
}

.li-box img,.li-box svg{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:block;
}

.li-box .li-fb{
  display:none;
}

.li-box.bad img{
  display:none;
}

.li-box.bad .li-fb{
  display:block;
}

.li-info{
  flex:1;
  min-width:0;
  padding-top:clamp(1px,.5vw,3px);
}

.li-title{
  font-size:var(--fz-ht);
  font-weight:700;
  line-height:1.05;
  white-space:nowrap;
  transition:font-size .2s;
}

.li-season{
  font-size:var(--fz-sz);
  font-weight:400;
  line-height:1;
  margin-top:1px;
  white-space:nowrap;
  letter-spacing:.02em;
  transition:font-size .2s;
}

.li-season .chev{
  font-size:.42em;
  vertical-align:middle;
  margin-left:clamp(3px,1vw,6px);
}

.hdr-acts{
  display:flex;
  gap:clamp(7px,2vw,12px);
  align-items:center;
  margin-left:auto;
  padding-top:2px;
}

.hdr-icon{
  width:clamp(22px,5.5vw,28px);
  height:clamp(22px,5.5vw,28px);
  display:grid;
  place-items:center;
  font-size:clamp(16px,4vw,20px);
  color:#dde4e8;
}

.tabs{
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 var(--pp);
  justify-content:flex-start;
  height:clamp(42px,10vw,52px);
  align-items:flex-end;
  gap:clamp(22px,6vw,44px);
  transition:height .2s;
}

.tabs::-webkit-scrollbar{
  display:none;
}

.tab{
  border:0;
  background:transparent;
  color:#8a969f;
  font-size:clamp(14px,3.18vw,15.8px);
  font-weight:680;
  padding:0 1px clamp(9px,2.2vw,12px);
  position:relative;
  white-space:nowrap;
  flex:0 0 auto;
  cursor:pointer;
  transition:font-size .2s,padding-bottom .2s;
}

.tab.active{
  color:#edf0f2;
  font-weight:700;
}

.tab.active::after{
  content:"";
  position:absolute;
  inset:auto 0 0;
  height:2.5px;
  background:#fff;
  border-radius:2px;
}

#ctrlWrap{
  position:fixed;
  left:0;
  right:0;
  top:var(--top-h,148px);
  z-index:500;
}

.ctrl-bar{
  background:#0d1419;
  border-bottom:1px solid #1c2730;
}

.kc-bar{
  background:#0d1419;
  border-bottom:1px solid #1c2730;
}

.ctrl-inner{
  max-width:var(--page-max);
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:clamp(5px,1.6vw,9px);
  padding:clamp(6px,1.7vw,10px) var(--pp);
}

.pill{
  border:0;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  font-size:clamp(12px,calc(11.2857px + 0.2232vw),13px)!important;
  font-weight:700;
  padding:clamp(7px,calc(6.2857px + 0.2232vw),8px) clamp(12px,calc(10.5714px + 0.4464vw),14px)!important;
  background:#131c22;
  color:#c8d2d8;
  transition:background .15s,color .15s;
}

.pill.active{
  background:#e8edf0;
  color:#0d1216;
}

.view-wrap{
  margin-left:auto;
  position:relative;
  z-index:60;
}

.view-btn{
  width:clamp(36px,9.5vw,46px);
  height:clamp(30px,8vw,38px);
  border-radius:clamp(8px,2vw,11px);
  border:0;
  background:#131c22;
  color:#c8d2d8;
  display:grid;
  place-items:center;
  cursor:pointer;
}

.hbars{
  width:46%;
  height:44%;
  position:relative;
}

.hbars::before,.hbars::after,.hbars i{
  content:"";
  position:absolute;
  left:0;
  right:0;
  height:2.5px;
  border-radius:2px;
  background:#b8c4cc;
}

.hbars::before{
  top:0;
}

.hbars i{
  top:50%;
  transform:translateY(-50%);
}

.hbars::after{
  bottom:0;
}

.hbars b{
  position:absolute;
  right:-3px;
  bottom:-2px;
  border:4.5px solid transparent;
  border-top-color:#b8c4cc;
  border-bottom:0;
}

.drop{
  display:none;
  position:absolute;
  right:0;
  top:calc(100% + 5px);
  min-width:clamp(120px,32vw,160px);
  background:#1c2730;
  border-radius:10px;
  overflow:hidden;
  z-index:20000;
  box-shadow:0 10px 28px rgba(0,0,0,.45);
}

.drop.open{
  display:block;
}

.drop button{
  width:100%;
  border:0;
  background:transparent;
  color:#d4dde2;
  text-align:left;
  font-size:clamp(12px,calc(11.25px + 0.2344vw),15px);
  font-weight:600;
  padding:clamp(9px,calc(8px + 0.3125vw),13px) clamp(12px,calc(10.5px + 0.4688vw),18px);
  cursor:pointer;
}

.drop button:hover{
  background:#242f38;
}

.drop button.active{
  color:#9ba7ff;
  background:#0e151b;
}

.kc-inner{
  max-width:var(--page-max);
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:clamp(6px,1.8vw,10px);
  padding:clamp(6px,1.7vw,10px) var(--pp);
}

.sel-wrap{
  position:relative;
  min-width:0;
  flex:1;
  z-index:60;
}

.sel-btn{
  width:100%;
  border:1px solid #2a363f;
  border-radius:8px;
  background:#111a1f;
  color:#d0d9de;
  font-size:clamp(13px,calc(12px + 0.2vw),16px)!important;
  font-weight:600;
  padding:clamp(7px,calc(6.25px + 0.2344vw),10px) clamp(12px,calc(10.5px + 0.4688vw),18px)!important;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  text-align:left;
  white-space:nowrap;
  overflow:hidden;
}

#koCtrl #selBtn{
  font-size:clamp(13px,calc(12.4px + 0.1875vw),16px)!important;
  padding:clamp(7px,calc(6.25px + 0.2344vw),10px) clamp(12px,calc(10.5px + 0.4688vw),18px)!important;
}

.sel-txt{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
}

.sel-chev{
  flex:0 0 auto;
  background:#090f12;
  border-radius:5px;
  padding:2px 6px;
  font-size:.75em;
  color:#8a969f;
}

.sel-drop{
  right:auto;
  left:0;
  min-width:min(280px,calc(100vw - 36px));
}

.expand-btn{
  flex:0 0 auto;
  background:#131c22;
  border:0;
  border-radius:8px;
  width:clamp(34px,9vw,42px);
  height:clamp(28px,7.5vw,34px);
  color:#c8d2d8;
  font-size:18px;
  cursor:pointer;
  display:grid;
  place-items:center;
}

.main{
  max-width:var(--page-max);
  margin:0 auto;
  padding:calc(clamp(10px,2.6vw,14px) + var(--ctrl-h,0px) + 12px) var(--pp) 64px;
}

.hidden{
  display:none!important;
}

.card{
  background:var(--surface);
  border-radius:var(--card-r);
  padding:var(--cp);
  margin-bottom:clamp(9px,2.4vw,14px);
  /* subtle inner border like SofaScore */
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.025);
}

.card-title{
  font-size:clamp(16px,1.04vw,24px)!important;
  font-weight:700;
  margin-bottom:clamp(8px,2vw,12px);
  color:#dde4e8;
  line-height:1.16!important;
}

.grid{
  display:grid;
  align-items:center;
}

.short{
  grid-template-columns:clamp(18px,4.6vw,24px)   /* rank */
    minmax(0,1fr)              /* team */
    clamp(24px,6vw,30px)      /* P */
    clamp(34px,8.2vw,42px)    /* GD */
    clamp(34px,8.2vw,42px);
  /* PTS */
  column-gap:clamp(4px,1.2vw,8px);
}

.full{
  grid-template-columns:clamp(18px,4.6vw,24px)
    minmax(0,1fr)
    repeat(4,clamp(22px,5.4vw,27px))
    clamp(38px,9vw,48px)
    clamp(30px,7.4vw,38px);
  column-gap:clamp(3px,1vw,6px);
}

.formv{
  grid-template-columns:clamp(18px,4.6vw,24px)
    minmax(0,1fr)
    clamp(110px,30vw,165px)
    clamp(30px,7.4vw,38px);
  column-gap:clamp(4px,1.2vw,8px);
}

.thead{
  color:var(--muted);
  font-size:var(--fz-xs);
  font-weight:700;
  min-height:clamp(16px,3.8vw,21px);
  margin-bottom:2px;
}

.thead>div{
  text-align:center;
}

.thead>div:nth-child(1),.thead>div:nth-child(2),.thead .th-team{
  text-align:left;
  padding-left:0;
}

.row{
  height:var(--row-h);
  font-size:var(--fz-md);
  font-weight:600;
  color:#d8dfe4;
  align-items:center;
  border-top:1px solid rgba(255,255,255,.04);
}

.row:first-of-type{
  border-top:0;
}

.rank{
  color:#c0cad1;
  text-align:center;
  font-size:var(--fz-md);
  font-variant-numeric:tabular-nums;
  font-weight:700;
}

.num{
  text-align:center;
  font-variant-numeric:tabular-nums;
  font-weight:600;
}

.tc{
  min-width:0;
  display:flex;
  align-items:center;
  gap:clamp(7px,1.9vw,10px);
}

.tname{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.crest{
  --cs:var(--logo);
  width:var(--cs);
  height:var(--cs);
  min-width:var(--cs);
  max-width:var(--cs);
  flex:0 0 var(--cs);
  position:relative;
  overflow:visible;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  align-self:center;
  background:transparent;
  border-radius:0;
  vertical-align:middle;
}

.crest img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  transform:none;
  transform-origin:center;
  display:block;
  image-rendering:auto;
}

.crest .svg-fb{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
}

.crest .svg-fb svg{
  width:80%;
  height:80%;
  display:block;
}

.crest .ini-fb{
  display:none;
  font-size:calc(var(--cs)*.32);
  font-weight:800;
  color:#cdd6dc;
  text-align:center;
  line-height:1;
  letter-spacing:-.02em;
  font-family:-apple-system,sans-serif;
}

.crest.has-svg img{
  display:block;
}

.crest.show-svg img{
  display:none!important;
}

.crest.show-svg .svg-fb{
  display:flex;
}

.crest.show-ini img{
  display:none!important;
}

.crest.show-ini .svg-fb{
  display:none!important;
}

.crest.show-ini{
  border-radius:50%;
  background:#1a2832;
  overflow:hidden;
}

.crest.show-ini .ini-fb{
  display:block;
}

.standings{
  display:flex;
  flex-direction:column;
  gap:0;
}

.zone{
  position:relative;
  padding-left:0;
}

.zone.zl{
  --zc:var(--green);
  padding-left:0;
}

.zone.zl::before{
  content:"";
  position:absolute;
  left:calc(0px - var(--cp));
  top:calc(clamp(6px,1.6vw,9px));
  bottom:0;
  border-left:2.5px solid var(--zc);
  border-top:2.5px solid var(--zc);
  border-bottom:2.5px solid var(--zc);
  border-right:0;
  width:clamp(9px,2.6vw,13px);
  background:transparent;
  pointer-events:none;
  z-index:1;
}

.zone.zl.zl-first::before{
  border-bottom:0;
  bottom:calc(-1 * clamp(8px,2.2vw,13px));
}

.zone.zl.zl-mid::before{
  border-top:0;
  border-bottom:0;
  top:calc(-1 * clamp(8px,2.2vw,13px));
  bottom:calc(-1 * clamp(8px,2.2vw,13px));
}

.zone.zl.zl-last::before{
  border-top:0;
  top:calc(-1 * clamp(8px,2.2vw,13px));
}

.zone.zl.zl-first + .zone.zl.zl-last,.zone.zl.zl-first + .zone.zl.zl-mid,.zone.zl.zl-mid + .zone.zl.zl-last,.zone.zl.zl-mid + .zone.zl.zl-mid{
  margin-top:0!important;
}

.zone.zl+.zone.zl{
  margin-top:clamp(8px,2.2vw,13px);
}

.zlabel{
  font-size:clamp(11.5px,calc(10.4286px + 0.3348vw),13px)!important;
  font-weight:780!important;
  color:var(--muted);
  padding-left:clamp(14px,4vw,24px);
  line-height:1.22!important;
  /* SofaScore:label sits ABOVE its first row, inside the zone */
  padding-top:clamp(6px,1.6vw,9px);
  padding-bottom:clamp(3px,1vw,5px);
}

.zone:first-child .zlabel{
  padding-top:0;
}

.updated{
  text-align:right;
  color:var(--muted2);
  font-size:clamp(11.5px,.72vw,14px)!important;
  margin-top:clamp(7px,1.8vw,10px);
  line-height:1.45!important;
}

.rules-row{
  margin-top:clamp(10px,2.6vw,14px);
  background:#0a1015;
  border-radius:10px;
  padding:clamp(9px,2.4vw,13px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:var(--fz-md);
  font-weight:700;
}

.rules-arr{
  width:12px;
  height:12px;
  border-right:2.5px solid #c0cad1;
  border-bottom:2.5px solid #c0cad1;
  transform:rotate(45deg);
}

.fstrip{
  display:flex;
  justify-content:flex-end;
}

.fb{
  width:clamp(21px,5.5vw,28px);
  height:clamp(18px,4.6vw,23px);
  display:grid;
  place-items:center;
  font-size:clamp(7.5px,1.9vw,9.5px);
  font-weight:800;
  color:#060c10;
}

.fb:first-child{
  border-radius:5px 0 0 5px;
}

.fb:last-child{
  border-radius:0 5px 5px 0;
}

.W{
  background:#1bc872;
}

.D{
  background:#909aa3;
}

.L{
  background:#ef4f4f;
}

.ko-area{
  background:#000;
  min-height:calc(100vh - var(--top-h) - 48px);
  padding:clamp(16px,4.5vw,28px) clamp(4px,1vw,10px) 60px;
  overflow:hidden;
  /* centre on wide screens */
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.ko-inner{
  max-width:var(--page-max);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bracket-row{
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:clamp(10px,3vw,24px);
  width:100%;
  justify-content:center;
}

.btrophy{
  font-size:clamp(40px,11vw,58px);
  flex:0 0 auto;
  /* vertically aligns naturally in flex row */
  align-self:center;
}

.bracket-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  position:relative;
}

.bmatch{
  width:clamp(154px,42vw,185px);
  background:#141d24;
  border-radius:10px;
  padding:clamp(8px,2.2vw,12px);
  position:relative;
  z-index:2;
}

.bteams{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(4px,1.2vw,7px);
  align-items:start;
}

.bteam{
  text-align:center;
  color:#c8d4d9;
  font-size:clamp(11.5px,calc(10.4286px + 0.3348vw),13px);
  font-weight:800;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(4px,1.1vw,6px);
  overflow:visible;
}

.bteam .crest{
  --cs:clamp(24px,6.2vw,30px);
}

.bteam>span{
  line-height:1.1;
  display:block;
  position:relative;
  z-index:2;
}

.bscore{
  text-align:center;
  font-size:clamp(18px,4.6vw,24px);
  font-weight:500;
  color:#ccd4d8;
  margin-top:5px;
  letter-spacing:.06em;
  font-variant-numeric:tabular-nums;
}

.bcon{
  width:2px;
  background:#1e2e38;
  flex:0 0 auto;
  align-self:center;
  height:clamp(18px,5vw,28px);
}

.bmatch.bfinal{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:clamp(50px,12vw,66px);
  color:#b8c4cc;
  text-align:center;
  font-size:clamp(9.5px,2.5vw,11.5px);
  font-weight:700;
  letter-spacing:.01em;
  line-height:1.3;
}

.bwm{
  margin-top:clamp(16px,4.5vw,28px);
  text-align:right;
  width:100%;
  color:#7e8c96;
  font-size:clamp(11px,3vw,14px);
  font-weight:700;
}

.baraj-area{
  background:#000;
  min-height:calc(100vh - var(--top-h) - 48px);
  padding-bottom:60px;
}

.baraj-wrap{
  max-width:var(--page-max);
  margin:0 auto;
  padding:clamp(18px,5vw,30px) var(--pp) 0;
  display:flex;
  align-items:flex-start;
  gap:clamp(10px,3vw,18px);
}

.baraj-trophy{
  font-size:clamp(44px,13.5vw,68px);
  flex:0 0 auto;
  padding-top:clamp(4px,1.5vw,10px);
}

.baraj-cards{
  display:flex;
  flex-direction:column;
  flex:1;
  min-width:0;
  gap:clamp(8px,2.4vw,13px);
}

.bpair{
  background:#141d24;
  border-radius:11px;
  padding:clamp(9px,2.5vw,13px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(5px,1.5vw,8px);
  border:0;
  cursor:pointer;
  width:100%;
  transition:background .15s;
}

.bpair:hover,.bpair:focus-visible{
  background:#1b2a35;
  outline:none;
}

.bpair-teams{
  display:flex;
  gap:clamp(14px,4.2vw,24px);
  align-items:flex-start;
  justify-content:center;
}

.bpteam{
  text-align:center;
  color:#c8d4d9;
  font-size:clamp(9px,2.35vw,11px);
  font-weight:800;
  display:grid;
  grid-template-rows:clamp(26px,7vw,32px) auto;
  gap:clamp(4px,1.1vw,6px);
  align-items:start;
  justify-items:center;
  overflow:visible;
}

.bpteam .crest{
  --cs:clamp(22px,5.8vw,28px);
  margin:0 auto;
}

.bpteam span{
  line-height:1.1;
  display:block;
  z-index:2;
  position:relative;
}

.bpteam.dim{
  opacity:.38;
}

.bpscore{
  font-size:clamp(18px,4.7vw,24px);
  font-weight:500;
  color:#dce4e8;
  letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
}

.baraj-foot{
  max-width:var(--page-max);
  margin:clamp(14px,4vw,22px) auto 0;
  padding:0 var(--pp);
  display:flex;
  justify-content:flex-end;
}

.baraj-wm{
  color:#7e8c96;
  font-size:clamp(11px,3vw,14px);
  font-weight:700;
}

.overlay{
  position:fixed;
  inset:0;
  z-index:99990;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  animation:fadeIn .18s ease;
}

html.modal-open{
  overflow:hidden!important;
}

body.modal-open{
  position:fixed!important;
  left:0;
  right:0;
  width:100%!important;
  overflow:hidden!important;
}

@keyframes fadeIn{
  from{opacity:0}to{opacity:1};
}

.sheet{
  background:#1c2730;
  border-radius:16px 16px 0 0;
  width:min(500px,100vw);
  max-height:82vh;
  overflow-y:auto;
  padding-bottom:32px;
  animation:slideUp .22s ease;
}

@keyframes slideUp{
  from{transform:translateY(30px);
  opacity:1};
}

.sheet-top{
  position:sticky;
  top:0;
  background:#1c2730;
  z-index:2;
  padding:10px 14px 4px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sheet-pill{
  width:38px;
  height:4px;
  background:#334150;
  border-radius:2px;
  cursor:pointer;
}

.sheet-x{
  position:absolute;
  right:12px;
  top:9px;
  width:26px;
  height:26px;
  border-radius:50%;
  border:0;
  background:#26343e;
  color:#8a969f;
  font-size:15px;
  display:grid;
  place-items:center;
  cursor:pointer;
}

.sheet-x:hover{
  background:#2e3f4c;
  color:#c0cad1;
}

.sheet-title{
  font-size:clamp(15px,calc(12.7143px + 0.7143vw),17px);
  font-weight:700;
  padding:clamp(10px,2.6vw,14px) clamp(14px,3.6vw,18px) clamp(4px,1.2vw,7px);
}

.me{
  display:grid;
  grid-template-columns:clamp(50px,13.5vw,66px) 1px 1fr clamp(30px,7.8vw,40px) clamp(28px,7.2vw,36px);
  align-items:stretch;
  min-height:clamp(52px,13.5vw,65px);
  border-top:1px solid rgba(255,255,255,.05);
  padding:0 clamp(12px,3.2vw,16px);
}

.me:first-child{
  border-top:0;
}

.me-date{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  gap:2px;
  padding-right:clamp(6px,1.8vw,9px);
  color:var(--muted);
  font-size:clamp(8px,2vw,9.5px);
  font-weight:700;
}

.me-date span{
  color:#58666f;
  font-size:.9em;
}

.me-sep{
  background:rgba(255,255,255,.07);
  margin:8px 0;
}

.me-teams{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:clamp(3px,1vw,5px);
  padding:5px clamp(7px,2vw,10px);
}

.me-team{
  display:flex;
  align-items:center;
  gap:clamp(6px,1.8vw,9px);
  font-size:clamp(10.5px,2.7vw,13px);
  font-weight:600;
  min-height:clamp(20px,5.2vw,25px);
}

.me-team .crest{
  --cs:clamp(17px,4.4vw,21px);
}

.me-name{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.me-team.dim{
  opacity:.4;
}

.me-score{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:clamp(4px,1.2vw,6px);
  font-size:clamp(12px,3.1vw,15px);
  font-weight:800;
  font-variant-numeric:tabular-nums;
  text-align:center;
  padding:4px 0;
}

.me-score .dim{
  opacity:.4;
}

.me-bell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#2e4554;
  font-size:clamp(14px,3.7vw,18px);
}

.sheet-verdict{
  margin:clamp(8px,2.4vw,12px) clamp(12px,3.2vw,16px) 0;
  background:#111a20;
  border-radius:9px;
  padding:clamp(8px,2.2vw,11px);
  font-size:clamp(9.5px,2.5vw,12px);
  font-weight:600;
  color:#b0bdc5;
  line-height:1.45;
}

.sheet-verdict b{
  color:#dde4e8;
}

.matches-section{
  display:flex;
  flex-direction:column;
  gap:clamp(8px,2.2vw,12px);
}

.round-card{
  background:var(--surface);
  border-radius:var(--card-r);
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.025);
}

.round-header{
  padding:clamp(7px,1.9vw,10px) clamp(10px,2.6vw,14px);
  font-size:clamp(11.2px,2.85vw,13.6px);
  font-weight:820;
  color:var(--muted2);
  border-bottom:1px solid rgba(255,255,255,.04);
  letter-spacing:.01em;
}

.round-comp{
  display:flex;
  align-items:center;
  gap:clamp(6px,.58vw,11px)!important;
  padding:clamp(7px,.68vw,12px) clamp(11px,.95vw,18px)!important;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:clamp(13px,calc(11.5714px + 0.4464vw),15px)!important;
  color:var(--muted2);
  font-weight:600;
}

.round-comp .rc-logo{
  width:clamp(18px,1.25vw,27px)!important;
  height:clamp(18px,1.25vw,27px)!important;
  object-fit:contain;
  flex:0 0 auto;
}

.rc-sep{
  color:#454f57;
  margin:0 2px;
}

.match-row{
  display:grid;
  grid-template-columns:clamp(66px,17vw,88px) 1px 1fr clamp(34px,8.5vw,46px) clamp(28px,7vw,36px);
  align-items:stretch;
  min-height:clamp(58px,4vw,82px)!important;
  border-top:1px solid rgba(255,255,255,.04);
  cursor:pointer;
  transition:background .15s ease;
}

.match-row:first-of-type{
  border-top:0;
}

.mr-date{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  gap:clamp(3px,1vw,5px);
  padding-right:clamp(8px,2.2vw,12px);
  color:#e8edf0;
  font-size:clamp(10.8px,.82vw,17px)!important;
  font-weight:900;
  font-variant-numeric:tabular-nums;
  min-width:0;
}

.mr-date span{
  color:#7f8c96;
  font-size:clamp(7.6px,.56vw,12px)!important;
  font-weight:800;
  word-break:break-word;
  text-align:right;
  max-width:100%;
}

.mr-sep{
  background:rgba(255,255,255,.08);
  margin:10px 0;
}

.mr-teams{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:clamp(6px,1.7vw,9px);
  padding:clamp(9px,2.4vw,13px) clamp(9px,2.6vw,14px);
}

.mr-team{
  display:flex;
  align-items:center;
  gap:clamp(4px,.42vw,8px)!important;
  font-size:clamp(10.8px,.86vw,17px)!important;
  font-weight:760;
  min-height:clamp(26px,6.5vw,34px);
  color:#d8e1e6;
}

.mr-team.win{
  color:#e8edf0;
  font-weight:750;
}

.mr-team.dim{
  opacity:.45;
}

.mr-team .crest{
  --cs:clamp(24px,6.3vw,32px);
}

.mr-tname{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.mr-scores{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:clamp(6px,1.7vw,9px);
  padding:clamp(9px,2.4vw,13px) 0;
  font-size:clamp(12.5px,1vw,19.5px)!important;
  font-weight:900;
  font-variant-numeric:tabular-nums;
  text-align:center;
  color:#c8d2d7;
}

.mr-scores .win{
  color:#e8edf0;
}

.mr-scores .dim{
  opacity:.45;
}

.mr-bell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#253540;
  font-size:clamp(13px,.82vw,18px)!important;
  padding-right:2px;
}

.stat-kpi-row{
  display:flex;
  gap:clamp(10px,2.8vw,16px);
  margin-bottom:clamp(15px,3.6vw,22px);
}

.stat-kpi{
  flex:1;
  background:#0a1015;
  border-radius:clamp(12px,3vw,16px);
  padding:clamp(13px,3.4vw,20px) clamp(9px,2.5vw,15px);
  text-align:center;
  min-height:clamp(76px,18vw,104px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.stat-kpi-val{
  font-size:clamp(24px,6.4vw,34px);
  font-weight:800;
  color:#e8edf0;
  line-height:1;
}

.stat-kpi-lbl{
  font-size:clamp(10px,2.65vw,13px);
  color:var(--muted);
  margin-top:clamp(5px,1.3vw,8px);
  font-weight:600;
  line-height:1.2;
}

.export-card{
  background:linear-gradient(180deg,rgba(39,201,106,.12),rgba(17,26,32,.98));
  border-color:rgba(39,201,106,.28);
}

.export-copy{
  color:var(--muted);
  font-size:clamp(13px,3.15vw,16px);
  font-weight:650;
  line-height:1.58;
  margin:0 0 14px;
}

.export-btn{
  width:100%;
  border:0;
  border-radius:clamp(12px,3vw,16px);
  background:var(--green);
  color:#06110a;
  font-weight:900;
  font-size:clamp(12px,.78vw,14px)!important;
  padding:clamp(10px,.82vw,13px) clamp(12px,1vw,16px)!important;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(39,201,106,.16);
}

.export-btn:active{
  transform:translateY(1px);
}

.export-hint{
  color:#9eadb6;
  font-size:clamp(10.5px,2.55vw,13px);
  font-weight:700;
  margin-top:10px;
}

.export-shell{
  max-width:1240px;
  margin:0 auto;
  padding:24px 12px 40px;
}

.export-block{
  margin-bottom:26px;
}

.export-block-title{
  font-size:22px;
  font-weight:900;
  color:#e8edf0;
  margin:0 0 12px;
  padding:0 2px;
}

.stat-section-title{
  font-size:clamp(13px,3.25vw,16px);
  font-weight:700;
  color:var(--muted2);
  margin:clamp(13px,3.2vw,20px) 0 clamp(7px,1.8vw,10px);
}

.stat-result-labels{
  display:flex;
  font-size:clamp(12px,3vw,15px);
  color:#c8d2d7;
  font-weight:600;
  margin-bottom:4px;
  line-height:1.25;
}

.stat-bar-row{
  display:flex;
  align-items:center;
  gap:clamp(7px,2vw,10px);
  margin-bottom:clamp(11px,2.8vw,16px);
}

.stat-bar-track{
  flex:1;
  height:clamp(9px,2.25vw,13px);
  background:#111a20;
  border-radius:99px;
  overflow:hidden;
}

.stat-bar-fill{
  height:100%;
  border-radius:99px;
  transition:width .4s ease;
}

.stat-bar-val{
  font-size:var(--fz-sm);
  color:var(--muted2);
  font-weight:700;
  min-width:40px;
  text-align:right;
}

.eff-total{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:#0d1820;
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:12px;
}

.eff-total-left{
  min-width:0;
}

.eff-total-label{
  font-size:11px;
  font-weight:750;
  color:#7e8c96;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:4px;
}

.eff-total-pts{
  font-size:clamp(28px,7vw,36px);
  font-weight:950;
  color:#fff;
  line-height:1;
  letter-spacing:-.01em;
}

.eff-total-pts span{
  font-size:.45em;
  color:#4a5f6e;
  font-weight:700;
  margin-left:3px;
}

.eff-total-right{
  text-align:right;
  flex-shrink:0;
}

.eff-total-pct{
  font-size:clamp(22px,5.5vw,28px);
  font-weight:900;
  color:#28d16c;
  line-height:1;
}

.eff-total-bar{
  margin-top:8px;
  height:6px;
  background:#1a2530;
  border-radius:99px;
  overflow:hidden;
}

.eff-total-bar-fill{
  height:100%;
  background:linear-gradient(90deg,#28d16c,#6ec6ff);
  border-radius:99px;
  transition:width .5s;
}

.eff-split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}

.eff-split-card{
  background:#0b1219;
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:11px 13px;
}

.eff-split-label{
  font-size:10px;
  font-weight:800;
  color:#4a5f6e;
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:6px;
}

.eff-split-row{
  display:flex;
  align-items:center;
  gap:6px;
}

.eff-split-pts{
  font-size:clamp(17px,4.2vw,21px);
  font-weight:900;
  color:#e8edf0;
  line-height:1;
  white-space:nowrap;
}

.eff-split-pts small{
  font-size:.6em;
  color:#4a5f6e;
  font-weight:700;
}

.eff-split-pct{
  font-size:12px;
  font-weight:800;
  color:#28d16c;
  margin-left:auto;
}

.eff-mini-bar{
  height:4px;
  background:#1a2530;
  border-radius:99px;
  overflow:hidden;
  margin:6px 0 7px;
}

.eff-mini-bar-fill{
  height:100%;
  border-radius:99px;
  transition:width .5s;
}

.eff-split-dots{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
}

.eff-sdot{
  display:flex;
  align-items:center;
  gap:3px;
  font-size:10px;
  font-weight:800;
  color:#6a7a84;
  white-space:nowrap;
}

.eff-sdot::before{
  content:'';
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}

.eff-sdot.exact{
  color:#28d16c;
}

.eff-sdot.exact::before{
  background:#28d16c;
}

.eff-sdot.diff{
  color:#f5d500;
}

.eff-sdot.diff::before{
  background:#f5d500;
}

.eff-sdot.outcome{
  color:#f59500;
}

.eff-sdot.outcome::before{
  background:#f59500;
}

.eff-sdot.miss{
  color:#f04050;
}

.eff-sdot.miss::before{
  background:#f04050;
}

.eff-legend{
  display:flex;
  flex-wrap:wrap;
  gap:6px 14px;
  padding:10px 0 2px;
  border-top:1px solid rgba(255,255,255,.06);
}

.eff-legend-item{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:10.5px;
  font-weight:750;
  color:#6a7a84;
  white-space:nowrap;
}

.eff-legend-item::before{
  content:'';
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:2px;
  flex-shrink:0;
}

.eff-legend-item.exact{
  color:#28d16c;
}

.eff-legend-item.exact::before{
  background:#28d16c;
}

.eff-legend-item.diff{
  color:#f5d500;
}

.eff-legend-item.diff::before{
  background:#f5d500;
}

.eff-legend-item.outcome{
  color:#f59500;
}

.eff-legend-item.outcome::before{
  background:#f59500;
}

.eff-legend-item.miss{
  color:#f04050;
}

.eff-legend-item.miss::before{
  background:#f04050;
}

.stat-phase-grid{
  display:flex;
  flex-direction:column;
  gap:clamp(11px,2.8vw,17px);
}

.stat-phase-card{
  background:#0a1015;
  border-radius:clamp(12px,3vw,16px);
  padding:clamp(13px,3.25vw,20px);
}

.stat-phase-name{
  font-size:clamp(15px,3.7vw,19px);
  font-weight:700;
  color:#dde4e8;
  margin-bottom:5px;
  line-height:1.18;
}

.stat-phase-row{
  display:flex;
  justify-content:space-between;
  font-size:var(--fz-xs);
  color:var(--muted);
  margin-bottom:7px;
}

.stat-phase-avg{
  font-weight:700;
  color:var(--muted2);
}

.stat-mini-bars{
  display:flex;
  height:clamp(8px,2vw,12px);
  border-radius:99px;
  overflow:hidden;
  gap:1px;
}

.stat-mini-bar{
  min-width:2px;
  transition:flex .3s;
}

.stat-mini-legend{
  display:flex;
  gap:clamp(8px,2.2vw,14px);
  margin-top:5px;
  font-size:var(--fz-xs);
  font-weight:700;
}

.stat-match-list{
  display:flex;
  flex-direction:column;
}

.stat-rank-num{
  font-size:var(--fz-xs);
  color:var(--muted);
  font-weight:800;
  padding:clamp(6px,1.8vw,9px) 0 0 clamp(2px,.8vw,4px);
}

.stat-match-row{
  padding:clamp(7px,1.9vw,10px) 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.stat-match-row:last-child{
  border-bottom:0;
}

.stat-match-teams{

/* smooth live update */
.mr-scores,.mr-live-state,.mr-score-wrap{transition:opacity .18s ease}
.live-updating .mr-scores,.live-updating .mr-live-state{opacity:.5}
.match-row.live-locked .mr-scores{animation:scoreFlash .4s ease}
@keyframes scoreFlash{0%{opacity:.4}60%{opacity:1}100%{opacity:1}}

.yellow-card-mark{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:.85em;
  height:1.1em;
  background:#f5c842;
  border-radius:2px;
  margin-right:4px;
  flex-shrink:0;
  vertical-align:middle;
}
.yellow-red-card-mark{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:1.3em;
  height:1.1em;
  background:linear-gradient(90deg,#f5c842 50%,#e03040 50%);
  border-radius:2px;
  margin-right:4px;
  flex-shrink:0;
  vertical-align:middle;
}
.yellow-card-row{opacity:.85}
.yellow-red-row{opacity:.95}

/* smooth modal score refresh */
.tip-real-cell{transition:opacity .18s ease}
.tip-live-clock{transition:opacity .2s ease}
.tip-below-score{transition:opacity .18s ease}
.live-row-flash{animation:rowFlash .35s ease}

function calcFairPlay(){
  // FIFA 2026 fair play pontrendszer:
  // Sárga lap: -1
  // Kettős sárga (yellowRed): -3
  // Direkt piros: -4
  // Sárga + direkt piros ugyanabban a meccsben: -5
  const fp={};
  ALL.forEach(n=>fp[n]={yellow:0,yellowRed:0,red:0,yellowPlusRed:0,score:0});
  FX.forEach(m=>{
    const r=LIVE_RESULTS[m.id];
    if(!r||(!(r.started||r.finished)))return;
    const yellows=Array.isArray(r.yellowCards)?r.yellowCards:[];
    const reds=Array.isArray(r.redCards)?r.redCards:[];
    // Sárga lapok
    yellows.forEach(c=>{
      const team=c.team==='a'?m.a:m.h;
      if(fp[team])fp[team].yellow++;
    });
    // Piros lapok - megkülönböztetjük a típusokat
    reds.forEach(c=>{
      const team=c.team==='a'?m.a:m.h;
      if(!fp[team])return;
      if(c.yellowRed){
        fp[team].yellowRed++;
      } else {
        // Direkt piros - volt-e ugyanebben a meccsben sárga lap is ennél a játékosnál?
        // Ha igen, sárga+direkt piros = -5 (a sárga -1 + piros -4 = -5)
        // Egyszerűsítve: a redCards-ban yellowPlusRed flag-et nézünk
        if(c.yellowPlusRed){
          fp[team].yellowPlusRed++;
        } else {
          fp[team].red++;
        }
      }
    });
  });
  // Pontszám számítás FIFA szabályok szerint
  Object.values(fp).forEach(t=>{
    t.score=-(t.yellow*1 + t.yellowRed*3 + t.red*4 + t.yellowPlusRed*5);
  });
  return fp;
}

function refreshOpenTipModal(){

  if(!ov)return;
  const id=ov.dataset.tipId;
  const x=FX_BY_ID[id];
  if(!x)return;
  const r=actualFor(x);
  if(!r)return;

  // Patch: csak a változó elemeket frissítjük, nem írjuk újra a teljes modált
  // 1. Real score
  const realH=ov.querySelector('.tip-real-h');
  const realA=ov.querySelector('.tip-real-a');
  if(realH&&validScore(r.h))realH.textContent=r.h;
  if(realA&&validScore(r.a))realA.textContent=r.a;

  // 2. Clock pill - fade transition
  const clockEl=ov.querySelector('.tip-live-clock:not(.int-modal-badge)');
  const intEl=ov.querySelector('.tip-live-clock.int-modal-badge');
  const clock=liveClockLabel(r);
  const isInt=r&&!r.finished&&String(r.status||'').toUpperCase().includes('INT');
  if(clockEl){
    const newClock=clock||'';
    if(clockEl.textContent!==newClock){
      clockEl.style.transition='opacity .2s';
      clockEl.style.opacity='0';
      setTimeout(()=>{clockEl.textContent=newClock;clockEl.style.opacity='1';},200);
    }
    clockEl.style.display=clock?'':'none';
  }
  if(intEl)intEl.style.display=isInt?'':'none';

  // 3. Gólszerzők - csak ha változott
  const gsList=ov.querySelector('.tip-below-score');
  if(gsList){
    const newHtml=goalScorersHtml(r,x);
    const clockPill=r?.finished?'<span class="tip-live-clock">FT</span>':
      ((clock?`<span class="tip-live-clock">${clock}</span>`:'')+
       (isInt?'<span class="tip-live-clock int-modal-badge">INT.</span>':''));
    const newFull=clockPill+newHtml;
    if(gsList.innerHTML!==newFull){
      gsList.style.transition='opacity .18s';
      gsList.style.opacity='0';
      setTimeout(()=>{
        gsList.innerHTML=newFull;
        gsList.style.opacity='1';
        activateCrests();

    }
  }

  const sc=tipScore(x);

}

function patchLiveRows(next){

  let ok=true;
  Object.keys(next||{}).forEach(id=>{
    const r=LIVE_RESULTS[id];
    if(!r)return;
    const row=document.querySelector('[data-mid="'+id+'"],[data-ko-mid="'+id+'"]');
    if(!row){
      // Ha modal nyitva van, az elem hiánya nem hiba (más fülön lehet)
      if(!document.querySelector('.tip-overlay'))ok=false;
      return;

    const m=FX_BY_ID[id];if(!m)return;

function exportSnapshotNav(){

  // Frozen + readonly flagek injektálása
  let data=JSON.stringify({pred:PRED,ko:KO_PRED,results:LIVE_RESULTS,createdAt:new Date().toISOString()});
  let flagScript=document.createElement('script');
  flagScript.id='wc26FreezeData';
  flagScript.textContent='window.__WC26_FROZEN__=true;window.__WC26_READONLY__=true;window.__WC26_FROZEN_DATA__='+data.replace(/</g,'\\u003c')+';window.__WC26_LIVE_RESULTS__='+JSON.stringify(LIVE_RESULTS).replace(/</g,'\\u003c')+';';
  let existingFlag=root.querySelector('#wc26FreezeData');
  if(existingFlag)existingFlag.replaceWith(flagScript);
  else root.querySelector('head').appendChild(flagScript);

  // Overlay-ek, modal-ok, közösség fül eltávolítása
  root.querySelectorAll('.tip-overlay,.overlay,.export-card').forEach(el=>el.remove());
  root.querySelectorAll('.mr-bell').forEach(el=>el.remove());

  // Közösség fül eltávolítása
  let commTab=root.querySelector('[data-tab="community"]');
  if(commTab)commTab.remove();

  // Title frissítése
  let t=root.querySelector('title');
  if(t)t.textContent='VB 2026 – tipp-pillanatkép';

  // Letöltés
  let html='<!doctype html>\n'+root.outerHTML;
  let blob=new Blob([html],{type:'text/html;charset=utf-8'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  let d=new Date(),pad=n=>String(n).padStart(2,'0');
  a.href=url;
  a.download='foci_vb_2026_tipp_snapshot_'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'.html';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1200);
}

    if(cat==='winner' || cat==='result' || cat==='kimenetel') return 'outcome';
    if(cat==='wrong' || cat==='incorrect' || cat==='hiba' || cat==='hibas' || cat==='missed') return 'miss';
    return '';
  }

  function wc26KoParityTime(m){
    try{
      if(typeof koMatchTime==='function') return koMatchTime(m);
    }catch(e){}
    try{
      const lr = LIVE_RESULTS[m.id] || null;
      const md = (lr && lr.date) ? lr.date : (m.date || '');
      const mt = (lr && lr.time) ? lr.time : ((KO_SCHEDULE[m.id]||{}).t || m.t || '');
      if(md && mt){
        return new Date(md+'T'+mt+':00+00:00').toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone});
      }
      return mt || '--:--';
    }catch(e){ return (m && m.t) || '--:--'; }
  }

  function wc26KoParityBadge(m){
    const sc = koTipScore(m) || {cat:'pending',label:''};
    const base = wc26KoBase(sc.base || sc.cat || '');
    const state = matchLockState({id:m.id});
    const r = LIVE_RESULTS[m.id] || null;
    const clk = r ? liveClockLabel(r) : '';
    if(base==='exact') return '<em class="mr-live-state ok">'+esc(sc.label||'Pontos')+'</em>';
    if(base==='diff') return '<em class="mr-live-state diff">'+esc(sc.label||'Gólkül.')+'</em>';
    if(base==='outcome') return '<em class="mr-live-state outcome">'+esc(sc.label||'Kimenetel')+'</em>';
    if(base==='miss') return '<em class="mr-live-state bad">'+esc(sc.label||'Hibás')+'</em>';
    if(state==='finished') return '';
    if(state==='live') return '<em class="mr-live-state live"><span></span>'+(clk||'Élő')+'</em>';
    if(state==='open') return '<em class="mr-live-state open">Tippelhető</em>';
    return '<em class="mr-live-state neutral">Zárolva</em>';
  }

  koMatchRow=function(m){
    const p=koPred(m.id);
    const cls=p?'win':'';
    const state=matchLockState({id:m.id});
    const sc=koTipScore(m) || {cat:'pending'};
    const base=wc26KoBase(sc.base || sc.cat || '');
    const locked=state!=='open';
    const edit=FROZEN_MODE||locked?'':'<div class="mr-bell">&#9998;</div>';
    const rowCls=(p?' predicted':'')+(locked?' locked':'')+(state==='live'?' live-locked':'')+
      (base==='exact'?' result-exact':base==='diff'?' result-diff':base==='outcome'?' result-outcome':base==='miss'?' result-miss':'');

    return '<div class="match-row'+rowCls+'" data-ko-parity-id="'+m.id+'">'
      +'<div class="mr-date">'+wc26KoParityTime(m)+'<span>'+(KO_ROUND_SHORT[m.title]||m.title||'Kieséses kör')+'</span>'+(p?'<em class="mr-tip">Tippelve</em>':'')+wc26KoParityBadge(m)+'</div>'
      +'<div class="mr-sep"></div>'
      +'<div class="mr-teams">'
        +'<div class="mr-team '+cls+'">'+crest(m.h||'')+'<span class="mr-tname">'+esc(m.h||m.hs||'')+'</span></div>'
        +'<div class="mr-team '+cls+'">'+crest(m.a||'')+'<span class="mr-tname">'+esc(m.a||m.as||'')+'</span></div>'
      +'</div>'
      +'<div class="mr-scores">'+scoreHtml(m)+'</div>'

    +'</div>';
  };

  function wc26BindKoParityRows(root){
    (root||document).querySelectorAll('.match-row[data-ko-parity-id]').forEach(row=>{

      });

  const __wc26PrevRenderMatchesV123 = renderMatches;
  renderMatches = function(){
    const out = __wc26PrevRenderMatchesV123.apply(this, arguments);
    wc26BindKoParityRows(document.getElementById('main')||document);

  patchLiveRows = function(next){

(function(){
  if(window.__WC26_V126_PATCH_ROWS_WITH_MODAL__) return;
  window.__WC26_V126_PATCH_ROWS_WITH_MODAL__ = true;

  mergeLiveResults=function(next){
    let changed=false, prune=false, fixed={};

    Object.entries(next||{}).forEach(([id,o])=>{
      const x=FX_BY_ID[id]||(()=>{try{return findKoMatch(id)||null}catch(e){return null}})();
      let r=normalizeLiveResult(id, (typeof attachOdds==='function') ? attachOdds(id,o,x) : o);
      if(!r)return;

      const old=LIVE_RESULTS[id];
      if(typeof wc26IncomingIsStale==='function' && wc26IncomingIsStale(id,r,old))return;
      if(old&&old.finished&&!r.finished)return;

      r = (typeof attachOdds==='function') ? attachOdds(id,r,x) : r;

      if(JSON.stringify(old)!==JSON.stringify(r)){
        LIVE_RESULTS[id]=r;
        fixed[id]=r;
        changed=true;
        if(r.finished&&(!old||!old.finished||old.h!==r.h||old.a!==r.a||old.pH!==r.pH||old.pA!==r.pA))prune=true;
      }
    });

    if(!changed)return false;

    if(prune)pruneStaleKoPred(true);

    return true;
  };
})();

/* ===== WC26 v128: one unified Matches-tab match-card renderer ===== */
(function(){
  if(window.__WC26_V128_UNIFIED_MATCH_CARDS__) return;
  window.__WC26_V128_UNIFIED_MATCH_CARDS__ = true;

  function wc26KoBaseV128(cat){
    cat=String(cat||'').toLowerCase();
    if(cat==='exact'||cat==='diff'||cat==='outcome'||cat==='miss') return cat;
    if(cat.indexOf('exact')===0) return 'exact';
    if(cat.indexOf('draw')===0 || cat.indexOf('diff')>=0) return 'diff';
    if(cat.indexOf('outcome')>=0 || cat==='winner' || cat==='result') return 'outcome';
    if(cat==='wrong'||cat==='incorrect'||cat==='missed') return 'miss';
    return '';
  }

  function wc26MatchTimeV128(x,isKo){
    if(!isKo) return localMatchTime(x);
    try{
      if(typeof koMatchTime==='function') return koMatchTime(x);
    }catch(e){}
    try{
      const r=LIVE_RESULTS[x.id]||null;
      const sch=(typeof KO_SCHEDULE!=='undefined'&&KO_SCHEDULE[x.id])?KO_SCHEDULE[x.id]:{};
      const d=(r&&r.date)||sch.date||x.date||'';
      const t=(r&&r.time)||sch.t||x.t||'';
      if(d&&t){
        return new Date(d+'T'+t+':00+00:00').toLocaleTimeString('hu-HU',{
          hour:'2-digit',
          minute:'2-digit',
          timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone
        });
      }
      return t||'--:--';
    }catch(e){return x.t||'--:--';}
  }

  function wc26RoundLabelV128(x,isKo){
    return isKo ? (KO_ROUND_SHORT[x.title]||x.title||x.round||'Kieséses kör') : (x.r+'. kör');
  }

  function wc26BadgeV128(x,isKo){
    if(!isKo) return matchStateBadge(x);

    const sc=koTipScore(x)||{cat:'pending',label:''};
    const base=wc26KoBaseV128(sc.base||sc.cat||'');
    const state=matchLockState({id:x.id});
    const r=LIVE_RESULTS[x.id]||null;
    const clk=r&&!r.finished?liveClockLabel(r):'';

    if(base==='exact') return '<em class="mr-live-state ok">'+esc(sc.label||'Pontos')+'</em>';
    if(base==='diff') return '<em class="mr-live-state diff">'+esc(sc.label||'Gólkül.')+'</em>';
    if(base==='outcome') return '<em class="mr-live-state outcome">'+esc(sc.label||'Kimenetel')+'</em>';
    if(base==='miss') return '<em class="mr-live-state bad">'+esc(sc.label||'Hibás')+'</em>';
    if(state==='finished') return '';
    if(state==='live') return '<em class="mr-live-state live"><span></span>'+(clk||'Élő')+'</em>';
    if(state==='open') return '<em class="mr-live-state open">Tippelhető</em>';
    return '<em class="mr-live-state neutral">Zárolva</em>';
  }

  function wc26ScoreCatV128(x,isKo){
    if(isKo){
      const sc=koTipScore(x)||{cat:''};
      return wc26KoBaseV128(sc.base||sc.cat||'');
    }
    return (tipScore(x)||{}).cat||'';
  }

  function wc26PredV128(x,isKo){
    return isKo ? koPred(x.id) : getPred(x.id);
  }

  function wc26UnifiedMatchRowV128(x,isKo){
    const p=wc26PredV128(x,isKo);
    const cls=p?'win':'';
    const state=matchLockState(isKo?{id:x.id}:x);

      (cat==='exact'?' result-exact':cat==='diff'?' result-diff':cat==='outcome'?' result-outcome':cat==='miss'?' result-miss':'');
    const dataAttr=isKo?' data-ko-match-id="'+x.id+'"':' data-mid="'+x.id+'"';
    const home=x.h||x.hs||'';
    const away=x.a||x.as||'';

    return '<div class="match-row'+rowCls+'"'+dataAttr+'>'
      +'<div class="mr-date">'+wc26MatchTimeV128(x,isKo)+'<span>'+wc26RoundLabelV128(x,isKo)+'</span>'+(p?'<em class="mr-tip">Tippelve</em>':'')+wc26BadgeV128(x,isKo)+'</div>'
      +'<div class="mr-sep"></div>'
      +'<div class="mr-teams"><div class="mr-team '+cls+'">'+crest(home)+'<span class="mr-tname">'+esc(home)+'</span></div><div class="mr-team '+cls+'">'+crest(away)+'<span class="mr-tname">'+esc(away)+'</span></div></div>'
      +'<div class="mr-scores">'+scoreHtml(x)+'</div>'+edit+'</div>';
  }

  mrow=function(x){
    return wc26UnifiedMatchRowV128(x,false);
  };

  koMatchRow=function(m){
    return wc26UnifiedMatchRowV128(m,true);
  };

  function wc26BindUnifiedRowsV128(root){
    (root||document).querySelectorAll('.match-row[data-ko-match-id]').forEach(row=>{
      if(row.__wc26UnifiedKoBound) return;
      row.__wc26UnifiedKoBound=true;
      row.addEventListener('click',e=>{
        e.stopPropagation();
        openKoTip(row.dataset.koMatchId);
      });
    });
  }

  const __wc26RenderMatchesV128=renderMatches;
  renderMatches=function(){
    const out=__wc26RenderMatchesV128.apply(this,arguments);
    wc26BindUnifiedRowsV128(document.getElementById('main')||document);
    return out;
  };

  const __wc26RenderV128=render;
  render=function(){
    const out=__wc26RenderV128.apply(this,arguments);
    if(S.tab==='matches') wc26BindUnifiedRowsV128(document.getElementById('main')||document);

  patchLiveRows=function(next){

      const r=LIVE_RESULTS[id];

      if(!row){
        if(!document.querySelector('.tip-overlay')) ok=false;
        return;
      }

      const x=isKo ? (function(){try{return findKoMatch(id)||wc26FindAnyMatch(id)||null}catch(e){return null}})() : FX_BY_ID[id];
      if(!x){ ok=false; return; }

      const fresh=document.createElement('div');
      fresh.innerHTML=wc26UnifiedMatchRowV128(x,isKo);
      const nextRow=fresh.firstElementChild;
      if(!nextRow){ok=false;return;}

      /*
        Row outerHTML csere helyett belső/sor-class patch:
        így modal alatt sem borítjuk a click állapotot, de minden vizuális rész frissül.
      */
      row.className=nextRow.className;
      row.innerHTML=nextRow.innerHTML;
      wc26BindUnifiedRowsV128(row.parentNode||document);
      touched++;
    });

    return touched>0&&ok;
  };

  mergeLiveResults=function(next){
    let changed=false, prune=false, fixed={};

    Object.entries(next||{}).forEach(([id,o])=>{
      const x=FX_BY_ID[id]||(()=>{try{return findKoMatch(id)||null}catch(e){return null}})();
      let r=normalizeLiveResult(id, (typeof attachOdds==='function') ? attachOdds(id,o,x) : o);
      if(!r) return;
      const old=LIVE_RESULTS[id];
      if(typeof wc26IncomingIsStale==='function' && wc26IncomingIsStale(id,r,old)) return;
      if(old&&old.finished&&!r.finished) return;

      r=(typeof attachOdds==='function') ? attachOdds(id,r,x) : r;

      if(JSON.stringify(old)!==JSON.stringify(r)){
        LIVE_RESULTS[id]=r;
        fixed[id]=r;
        changed=true;
        if(r.finished&&(!old||!old.finished||old.h!==r.h||old.a!==r.a||old.pH!==r.pH||old.pA!==r.pA)) prune=true;
      }
    });

    if(!changed) return false;
    if(prune) pruneStaleKoPred(true);

    if(S.tab==='matches'||S.tab==='overview'){

    try{refreshCommunityPreviews();}catch(e){}

    return true;

  /*

/* ===== WC26 v129: backend wins, localStorage can never auto-overwrite Firebase tips ===== */
(function(){
  if(window.__WC26_V129_BACKEND_WINS_TIPS__) return;
  window.__WC26_V129_BACKEND_WINS_TIPS__ = true;

  let wc26BackendHydratedV129=false;
  let wc26ManualTipMutationV129=false;
  let wc26DirtyAfterBackendHydrateV129=false;

  try{ clearTimeout(wc26AutosaveTimer); }catch(e){}

  function wc26LocalSaveOnlyV129(){
    try{
      localStorage.setItem(STORE_KEY,JSON.stringify(PRED||{}));
      localStorage.setItem(KO_STORE_KEY,JSON.stringify(KO_PRED||{}));
    }catch(e){}
  }

  function wc26CanPublishV129(){
    return !!(wc26Db && wc26User && wc26OwnTipsLoaded && !wc26OwnTipsLoadFailed && wc26BackendHydratedV129);
  }

  function wc26ManualWrapV129(fn){
    wc26ManualTipMutationV129=true;
    try{
      const out=fn();
      if(out && typeof out.then==='function'){
        return out.finally(()=>{wc26ManualTipMutationV129=false;});
      }
      return out;
    }finally{
      if(!fn || !(fn._asyncLike)) wc26ManualTipMutationV129=false;
    }
  }

  loadOwnTipsFromFirebase=async function(){
    if(!wc26Db||!wc26User)return false;

    try{ clearTimeout(wc26AutosaveTimer); }catch(e){}
    wc26OwnTipsLoaded=false;
    wc26OwnTipsLoadFailed=false;
    wc26RemoteDocExists=false;
    wc26BackendHydratedV129=false;
    wc26DirtyAfterBackendHydrateV129=false;

    try{
      const doc=await wc26Db.collection(WC26_COMMUNITY_COLLECTION).doc(wc26User.uid).get();
      wc26RemoteDocExists=!!doc.exists;

      if(doc.exists){
        const d=doc.data()||{};
        const remotePred=wc26PickObj(d,['pred','predictions','tips','groupPred','groupPredictions','PRED']);
        const remoteKo=wc26PickObj(d,['ko','knockout','knockoutPredictions','koPred','KO_PRED']);

        /*
          HARD RULE:
          bejelentkezett usernél a Firebase a source of truth.
          LocalStorage soha nem merge-el rá automatikusan meglévő backend docra.
        */
        PRED=wc26CleanTips(remotePred);
        KO_PRED=wc26CleanTips(remoteKo);
        wc26ClearLocalPreds();

        wc26OwnTipsLoaded=true;
        wc26BackendHydratedV129=true;
        wc26DirtyAfterBackendHydrateV129=false;

        render();
        if(groupsComplete())syncKoPairsToWorker();
        return true;
      }

      /*
        Új / backend nélküli user:
        localStorage megmaradhat seednek, de NEM publisholjuk automatikusan.
        Csak következő kézi tippmódosítás után mehet Firebase-be.
      */
      const local=wc26ReadLocalPreds();
      PRED=wc26CleanTips(local.pred);
      KO_PRED=wc26CleanTips(local.ko);

      wc26OwnTipsLoaded=true;
      wc26BackendHydratedV129=true;
      wc26DirtyAfterBackendHydrateV129=false;

      render();
      return false;
    }catch(e){
      wc26OwnTipsLoadFailed=true;
      wc26OwnTipsLoaded=false;
      wc26BackendHydratedV129=false;
      wc26BackendError=e.message||String(e);
      try{ clearTimeout(wc26AutosaveTimer); }catch(_){}
      return false;
    }
  };

  queueCommunityAutosave=function(){
    if(!wc26Db||!wc26User)return;
    if(!wc26CanPublishV129())return;
    if(wc26RemoteDocExists && !wc26DirtyAfterBackendHydrateV129)return;

    clearTimeout(wc26AutosaveTimer);
    wc26AutosaveTimer=setTimeout(()=>publishCommunityTips(true,{allowEmpty:true}),900);
  };

  savePred=function(){
    if(FROZEN_MODE)return;

    if(wc26User){
      /*
        Ez zárja ki a bugot:
        auth alatt / backend-load előtt / sikertelen backend-load után nincs publish,
        és localStorage sem írhat backend fölé.
      */
      if(!wc26CanPublishV129()){
        try{ clearTimeout(wc26AutosaveTimer); }catch(e){}
        return;
      }

      if(wc26ManualTipMutationV129){
        wc26DirtyAfterBackendHydrateV129=true;
        queueCommunityAutosave();
      }
      return;
    }

    wc26LocalSaveOnlyV129();
  };

  publishCommunityTips=async function(silent,opts={}){

  mergeLiveResults=function(next){

/* ===== WC26 v135 SAFE: no buildKO/calcFairPlay recursion on overview ===== */
(function(){
  if(window.__WC26_V135_SAFE_NO_FREEZE__) return;
  window.__WC26_V135_SAFE_NO_FREEZE__ = true;

  function arr(v){
    if(Array.isArray(v)) return v;
    if(typeof v==='string'){
      try{ const x=JSON.parse(v); return Array.isArray(x)?x:[]; }catch(e){ return []; }
    }
    return [];
  }

  function teamFromEvent(ev,m){
    const raw=String(ev&&((ev.team!==undefined?ev.team:null)??ev.side??ev.teamSide??ev.homeAway) || '').toLowerCase();
    if(raw==='a'||raw==='away'||raw==='visitor'||raw==='visitors'||raw==='2') return m.a;
    if(raw==='h'||raw==='home'||raw==='1') return m.h;
    const name=(ev&&(ev.teamName||ev.teamDisplayName||ev.country||ev.squad||ev.club))||'';
    if(name){
      try{
        const n=normLiveName(name);
        if(n && normLiveName(m.a)===n) return m.a;
        if(n && normLiveName(m.h)===n) return m.h;
      }catch(e){}
    }
    return m.h||'';
  }

  function playerName(ev){ return String((ev&&(ev.player||ev.playerName||ev.name||ev.person||ev.athlete))||'').trim(); }
  function minuteKey(ev){ return String((ev&&(ev.minute??ev.time??ev.displayTime??ev.clock??ev.matchTime))||'').replace(/\s+/g,'').trim(); }
  function evKey(kind,ev,m){
    return [kind,m.id||'',teamFromEvent(ev,m)||'',playerName(ev),minuteKey(ev),ev&&ev.og?'og':'',ev&&(ev.penalty||ev.pen)?'pen':''].join('|');
  }
  function realEntries(){
    const out=[];
    (FX||[]).forEach(m=>{
      const r=LIVE_RESULTS&&LIVE_RESULTS[m.id];
      if(r&&(r.started||r.finished)&&validScore(r.h)&&validScore(r.a)) out.push({m,r});
    });
    Object.entries(LIVE_RESULTS||{}).forEach(([id,r])=>{
      if(!String(id).startsWith('KO-')) return;
      if(!r||(r.started!==true&&r.finished!==true)||!validScore(r.h)||!validScore(r.a)) return;
      const sch=(KO_SCHEDULE&&KO_SCHEDULE[id])||{};
      out.push({
        m:{
          id,
          h:r.homeTeam||r.hTeam||r.home||'TBD',
          a:r.awayTeam||r.aTeam||r.away||'TBD',
          g:'',
          d:r.date||sch.date||'',
          title:String(id).includes('-F-')?'Döntő':String(id).includes('-SF-')?'Elődöntő':String(id).includes('-QF-')?'Negyeddöntő':String(id).includes('-R16-')?'Nyolcaddöntő':String(id).includes('-R32-')?'Legjobb 32':'Kieséses kör',
          index:''
        },
        r
      });
    });
    return out;
  }

  topScorersList=function(){
    const counts={},seen=new Set();
    realEntries().forEach(({m,r})=>{
      arr(r.scorers).forEach(ev=>{
        if(!ev||ev.og) return;
        const player=playerName(ev), team=teamFromEvent(ev,m);
        if(!player||!team) return;
        const k=evKey('goal',ev,m);
        if(seen.has(k)) return;
        seen.add(k);
        const key=player+'|'+team;
        if(!counts[key]) counts[key]={player,team,goals:0};
        counts[key].goals++;
      });
    });
    return Object.values(counts).sort((a,b)=>b.goals-a.goals||a.team.localeCompare(b.team)||a.player.localeCompare(b.player)).slice(0,20);
  };

  calcFairPlay=function(){
    const fp={};
    (ALL||[]).forEach(n=>fp[n]={yellow:0,yellowRed:0,red:0,yellowPlusRed:0,score:0});
    const seen=new Set();
    realEntries().forEach(({m,r})=>{
      arr(r.yellowCards).forEach(ev=>{
        const team=teamFromEvent(ev,m); if(!fp[team]) return;
        const k=evKey('yellow',ev,m); if(seen.has(k)) return; seen.add(k);
        fp[team].yellow++;
      });
      arr(r.redCards).forEach(ev=>{
        const team=teamFromEvent(ev,m); if(!fp[team]) return;
        const raw=String((ev&&(ev.type||ev.card||ev.eventType||ev.kind||ev.name))||'').toLowerCase();
        const yellowRed=!!(ev&&(ev.yellowRed||ev.secondYellow))||raw.includes('second yellow')||raw.includes('yellow-red')||raw.includes('second_yellow');
        const yellowPlusRed=!!(ev&&(ev.yellowPlusRed||ev.yellowThenRed))||raw.includes('yellow+red');
        const k=evKey(yellowRed?'yellowRed':yellowPlusRed?'yellowPlusRed':'red',ev,m); if(seen.has(k)) return; seen.add(k);
        if(yellowRed) fp[team].yellowRed++;
        else if(yellowPlusRed) fp[team].yellowPlusRed++;
        else fp[team].red++;
      });
    });
    Object.values(fp).forEach(t=>{ t.score=-(t.yellow*1+t.yellowRed*3+t.red*4+t.yellowPlusRed*5); });
    return fp;
  };

  topMatchesHtml=function(){
    const actual=realEntries().map(({m,r})=>({
      m:{id:m.id,h:m.h||r.homeTeam||'',a:m.a||r.awayTeam||'',g:m.g||'',d:m.d||r.date||'',title:m.title||m.phase||'',index:m.index||''},
      p:{h:+r.h,a:+r.a,pH:validScore(r.pH)?+r.pH:null,pA:validScore(r.pA)?+r.pA:null},
      source:'Valós'
    }));
    const actualIds=new Set(actual.map(x=>x.m.id));
    const tipRes=(FX||[]).filter(x=>!actualIds.has(x.id)).map(x=>({m:x,p:PRED[x.id],source:'Tipp'})).filter(x=>x.p&&validScore(x.p.h)&&validScore(x.p.a));
    const res=actual.concat(tipRes);
    const goalMatches=res.slice().sort((a,b)=>(+b.p.h + +b.p.a)-(+a.p.h + +a.p.a)||Math.abs(+b.p.h-+b.p.a)-Math.abs(+a.p.h-+a.p.a)).slice(0,20);
    const diffMatches=res.slice().sort((a,b)=>Math.abs(+b.p.h-+b.p.a)-Math.abs(+a.p.h-+a.p.a)||(+b.p.h + +b.p.a)-(+a.p.h + +a.p.a)).slice(0,20);
    return '<section class="card"><h2 class="card-title">Legg&oacute;losabb meccsek - Top 20</h2><div class="wc-stat-list stat-match-list">'
      +(goalMatches.length?goalMatches.map((x,i)=>matchStatRow(i+1,x,'score')).join(''):Array.from({length:20},(_,i)=>statRow(i+1,'M&eacute;g nincs adat','A val&oacute;s g&oacute;lszerz&#337;k ut&aacute;n friss&uuml;l','0')).join(''))
      +'</div></section><section class="card"><h2 class="card-title">Legegyoldal&uacute;bb meccsek - Top 20</h2><div class="wc-stat-list stat-match-list">'
      +(diffMatches.length?diffMatches.map((x,i)=>matchStatRow(i+1,x,'diff')).join(''):Array.from({length:20},(_,i)=>statRow(i+1,'M&eacute;g nincs lej&aacute;tszott m&eacute;rk&#337;z&eacute;s','G&oacute;lk&uuml;l&ouml;nbs&eacute;g: 0','0')).join(''))
      +'</div></section>';
  };
})();

/* ===== WC26 v149: community tab chrome/control sync fix =====
   V148 left one old community render short-circuit in the render chain.
   Result: Community content could render while the Matches tab and match controls
   stayed visually active. This is a tiny, non-data fix: whenever Community renders,
   the top tab state and control bars are synced without kicking any Firebase reads.
*/
(function(){
  if(window.__WC26_V149_COMMUNITY_CHROME_SYNC__) return;
  window.__WC26_V149_COMMUNITY_CHROME_SYNC__=true;

  function byId(id){return document.getElementById(id);}
  function syncChrome(){
    try{
      const current=(S&&S.tab)||'';
      document.querySelectorAll('#tabs .tab').forEach(btn=>{
        btn.classList.toggle('active', btn.dataset && btn.dataset.tab===current);
      });
      const tbl=byId('tblCtrl'), ko=byId('koCtrl'), mc=byId('mCtrl'), rb=byId('mRoundBar'), tb=byId('mTeamBar');
      if(tbl) tbl.classList.toggle('hidden', current!=='table');
      if(ko) ko.classList.toggle('hidden', current!=='knockout');
      if(mc) mc.classList.toggle('hidden', current!=='matches');
      if(rb) rb.classList.toggle('hidden', !(current==='matches' && MS && MS.filt==='round'));
      if(tb) tb.classList.toggle('hidden', !(current==='matches' && MS && MS.filt==='team'));
      if(current==='community'){
        [tbl,ko,mc,rb,tb].forEach(el=>{ if(el) el.classList.add('hidden'); });
        const main=byId('main');

      }

  }

  const prevRenderCommunity=typeof renderCommunity==='function'?renderCommunity:null;
  if(prevRenderCommunity){
    renderCommunity=function(){
      syncChrome();
      const out=prevRenderCommunity.apply(this,arguments);
      syncChrome();
      return out;
    };
  }

  const prevRender=typeof render==='function'?render:null;
  if(prevRender){
    render=function(){
      const out=prevRender.apply(this,arguments);

      return out;
    };
  }

  document.addEventListener('click',function(e){
    const btn=e.target && e.target.closest && e.target.closest('#tabs .tab[data-tab]');
    if(!btn) return;

})();

      const ea=(a.__summary && a.__summary.eff) || {}, eb=(b.__summary && b.__summary.eff) || {};
      return (eb.pct||0)-(ea.pct||0) || (eb.pts||0)-(ea.pts||0) || (eb.max||0)-(ea.max||0) || String(a.displayName||'').localeCompare(String(b.displayName||''),'hu');
    });
  }
  function queueRenderCommunity(){
    if(!isCommunity() || renderQueued) return;
    renderQueued = true;
    setTimeout(()=>{ renderQueued=false; try{ renderCommunity(); }catch(e){} },0);
  }
  function statusHtml(){
    if(loading) return '<div class="community-hint">Közösségi rangsor betöltése...</div>';
    if(lastError) return '<div class="community-hint community-error">Közösség betöltési hiba: '+htmlEsc(lastError)+'</div>';

  }
  function skeleton(){
    return '<div class="community-empty">Közösségi rangsor betöltése...</div>';
  }
  function statsHtml(){
    try{return communityStatsHtml(communitySummary(PRED||{},KO_PRED||{}));}

  function rankMeta(e){ try{return communityRankMeta(e);}catch(err){return e && e.max ? ((e.pts||0)+' pont / '+(e.max||0)+' meccs') : 'Nincs élő vagy lezárt meccs';} }

  async function loadCommunity(force){
    const u = communityUrl();
    if(!u){ lastError='Worker /community URL hiányzik'; setCommunityItems(wc26CommunityItems||[]); return false; }
    const freshEnough = loadedAt && (Date.now()-loadedAt < MIN_RELOAD_MS);
    if(!force && freshEnough && Array.isArray(wc26CommunityItems) && wc26CommunityItems.length) return true;

      try{
        const res = await fetch(u, { method:'GET', cache:'default' });
        if(!res.ok) throw new Error('/community '+res.status);
        const data = await res.json();
        const rows = data.items || data.community || data.results || [];
        setCommunityItems(rows);
        loadedAt = Date.now();
        lastError = '';
        try{ window.WC26_COMMUNITY_DEBUG = { route:'v172-worker-only', source:data.source||'', count:wc26CommunityItems.length, at:new Date().toISOString() }; }catch(e){}
        return true;
      }catch(e){
        lastError = e && e.message ? e.message : String(e || 'community error');

      }finally{
        loading = false;
        inFlight = null;

      }
    })();

  loadCommunityTips = function(force){ return loadCommunity(!!force); };
  listenCommunityTips = function(){ try{ if(wc26CommunityUnsub){ wc26CommunityUnsub(); wc26CommunityUnsub=null; } }catch(e){} return false; };
  window.wc26CommunityHardRefresh = function(){ loadedAt = 0; return loadCommunity(true); };

  renderCommunity = function(){
    const m=document.getElementById('main');
    if(!m) return;

    try{
      document.querySelectorAll('#tabs .tab').forEach(btn=>btn.classList.toggle('active', btn.dataset && btn.dataset.tab==='community'));

      ? '<div class="community-user"><img class="community-avatar" src="'+htmlEsc(wc26User.photoURL||'')+'" alt=""><div><div class="community-name">'+htmlEsc(wc26User.displayName||wc26User.email||'Játékos')+'</div><div class="community-meta">Bejelentkezve · saját tippjeid automatikusan mentődnek</div></div></div><div class="community-actions"><button class="community-btn" id="wc26RenameBtn">Név módosítása</button><button class="community-btn" id="wc26LogoutBtn">Kilépés</button><button class="community-btn" id="wc26CommunityRefreshBtn">Frissítés</button></div>'

    const rows = Array.isArray(wc26CommunityItems) ? wc26CommunityItems : [];

      }).join('');
    }else listHtml='<div class="community-empty">Még nincs publikus VB-tipp a külön backendben.</div>';
    m.innerHTML = setupHtml + '<section class="card community-card community-top-card"><h1 class="community-title">Közösség</h1>'+authHtml+statsHtml()+statusHtml()+'</section><section class="card community-card"><h2 class="community-section-title" style="margin-top:0">Rangsor pontosság szerint</h2>'+listHtml+'</section>';
    m.querySelector('#wc26LoginBtn')?.addEventListener('click',()=>{ try{ wc26SignIn(); }catch(e){} });
    m.querySelector('#wc26LogoutBtn')?.addEventListener('click',()=>{ try{ wc26SignOut(); }catch(e){} });
    m.querySelector('#wc26RenameBtn')?.addEventListener('click',()=>{ try{ wc26RenameProfile(); }catch(e){} });
    m.querySelector('#wc26CommunityRefreshBtn')?.addEventListener('click',()=>{ loadedAt=0; loadCommunity(true); });
    m.querySelectorAll('[data-community-view]').forEach(b=>b.addEventListener('click',()=>{ try{ openCommunityTips(b.dataset.communityView); }catch(e){} }));
    try{ activateCrests(); }catch(e){}
    try{ syncSpacer(); }catch(e){}
    if(isCommunity() && !loading && (!loadedAt || (Date.now()-loadedAt > MIN_RELOAD_MS && !rows.length))){ setTimeout(()=>loadCommunity(false),40); }
  };

  // Keep old click listeners harmless: they may still call loadCommunityTips(), but that now goes through one inflight/throttle path.
  document.addEventListener('click',function(e){
    const btn=e.target && e.target.closest && e.target.closest('#tabs .tab[data-tab="community"]');
    if(btn) setTimeout(()=>{ if(isCommunity()) loadCommunity(false); },80);
  },true);

  try{ window.WC26_COMMUNITY_DEBUG = Object.assign({}, window.WC26_COMMUNITY_DEBUG||{}, { route:'v172-installed', installedAt:new Date().toISOString() }); }catch(e){}
})();

<script id="wc26FullReadonlyExportPatch">

    function safeClone(value, fallback){
      try { return JSON.parse(JSON.stringify(value)); }
      catch(e){ return fallback; }
    }

    function removeCommunity(){
      document.querySelectorAll('[data-tab="community"],[data-export-tab="community"]').forEach(el=>el.remove());

          LIVE_RESULTS = safeClone(frozen.results, {});
        }
      } catch(e){}

      try {
        if(frozen.pred && typeof PRED !== 'undefined'){
          PRED = safeClone(frozen.pred, {});
        }
        if(frozen.ko && typeof KO_PRED !== 'undefined'){
          KO_PRED = safeClone(frozen.ko, {});
        }
      } catch(e){}
    }

    function readonlyModal(){
      const overlay = document.querySelector('.tip-overlay');
      if(!overlay) return;
      overlay.classList.add('wc26-export-readonly-modal');

      overlay.querySelectorAll('input,select,textarea').forEach(el=>{
        el.readOnly = true;

        el.setAttribute('tabindex','-1');

      overlay.querySelectorAll('[data-save-tip],[data-clear-tip],.tip-actions').forEach(el=>{

      }

        verdict.classList.add('wc26-export-readonly-note');
        verdict.innerHTML = '<b>Csak megtekinthető</b> Ez az exportálás pillanatában elmentett tipp; a generált HTML-ben nem módosítható.';
      }
    }

    function rowFromTarget(target){
      return target && target.closest ? target.closest(
        '.match-row[data-mid],'+
        '.match-row[data-ko-mid],'+
        '.match-row[data-ko-match-id],'+
        '.match-row[data-ko-parity-id],'+
        '.match-row[data-ko-group-id],'+
        '.ko-card[data-koid]'
      ) : null;
    }

    let pointerStart = null;
    document.addEventListener('pointerdown',e=>{
      const row = rowFromTarget(e.target);
      pointerStart = row ? {row,x:e.clientX,y:e.clientY} : null;
    },true);

    document.addEventListener('click',e=>{
      if(e.target && e.target.closest && e.target.closest('.tip-overlay')) return;
      const row = rowFromTarget(e.target);
      if(!row) return;

      if(pointerStart && pointerStart.row === row){
        const moved = Math.hypot(e.clientX-pointerStart.x,e.clientY-pointerStart.y) > 8;
        pointerStart = null;
        if(moved) return;
      }

      const koId = row.getAttribute('data-koid')
        || row.getAttribute('data-ko-mid')
        || row.getAttribute('data-ko-match-id')
        || row.getAttribute('data-ko-parity-id')
        || row.getAttribute('data-ko-group-id');
      const groupId = row.getAttribute('data-mid');

      e.preventDefault();
      e.stopPropagation();

      try {
        if(koId && typeof openKoTip === 'function') openKoTip(koId);

        console.error('A beégetett meccsmodal nem nyitható meg:',err);
      }

      requestAnimationFrame(readonlyModal);
      setTimeout(readonlyModal,0);
      setTimeout(readonlyModal,80);
    },true);

    const observer = new MutationObserver(()=>readonlyModal());
    if(document.body) observer.observe(document.body,{childList:true,subtree:true});

    removeCommunity();

      if(typeof S !== 'undefined' && S){
        if(S.tab === 'community') S.tab = 'overview';

    removeCommunity();

    setTimeout(()=>{
      removeCommunity();
      readonlyModal();
      try { if(typeof syncSoon === 'function') syncSoon(); } catch(e){}

      html.frozen-mode .tip-overlay input:disabled,
      html.frozen-mode .tip-overlay select:disabled,
      html.frozen-mode .tip-overlay textarea:disabled{

    };

})();
