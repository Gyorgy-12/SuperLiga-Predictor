  <script src="./src/data/firebase-config.js"></script>

<script>
  window.__SUPERLIGA_BOOTSTRAP_LIGHT_PREFETCH__=(function(){
    try{
      var started=Date.now();
      var base=String(window.SUPERLIGA_WORKER_URL||'').replace(/\/$/,'');
      var read=String(window.SUPERLIGA_RESULTS_READ_URL||'');
      var url=window.SUPERLIGA_BOOTSTRAP_LIGHT_URL||(base?base+'/bootstrap-light':(read?read.replace(/\/results(?:\?.*)?$/,'')+'/bootstrap-light':''));
      if(!url)return Promise.resolve(null);
      try{var link=document.createElement('link');link.rel='preconnect';link.href=url.replace(/\/bootstrap-light(?:\?.*)?$/,'');link.crossOrigin='';document.head.appendChild(link);}catch(_e){}
      return fetch(url+(url.indexOf('?')>-1?'&':'?')+'v=superliga-head',{headers:{'Accept':'application/json'},credentials:'omit'})
        .then(function(r){if(!r.ok)throw new Error('bootstrap-light HTTP '+r.status);return r.json();})
        .then(function(d){try{window.__SUPERLIGA_BOOTSTRAP_LIGHT_PREFETCH_META__={ok:true,tookMs:Date.now()-started,at:new Date().toISOString()};}catch(e){}return d;})
        .catch(function(e){try{window.__SUPERLIGA_BOOTSTRAP_LIGHT_PREFETCH_META__={ok:false,error:e&&e.message?e.message:String(e),at:new Date().toISOString()};}catch(_e){}return null;});
    }catch(e){return Promise.resolve(null);}
  })();
  </script>
